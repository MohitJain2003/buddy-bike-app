<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buddy's Bike | Premium Used Bikes Marketplace</title>
    <meta name="description" content="Buddy's Bike - Your trusted marketplace for premium used bikes. Explore top brands like Royal Enfield, KTM, Honda & more." />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(event) {
        // Ignore cross-origin script errors or browser extension/in-app tracker errors
        if (
          event.message === 'Script error.' ||
          !event.filename ||
          (event.filename.indexOf('http') === 0 && event.filename.indexOf(window.location.host) === -1)
        ) {
          return; // Allow the app to keep running
        }

        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div style="padding: 20px; color: #ff3333; background: #1a0000; border: 1px solid #ff0000; margin: 20px; font-family: monospace; border-radius: 8px; z-index: 99999; position: relative;">
              <h3>🚨 Application Runtime Error</h3>
              <p><strong>Message:</strong> ${event.message}</p>
              <p><strong>Filename:</strong> ${event.filename}</p>
              <p><strong>Line:</strong> ${event.lineno}:${event.colno}</p>
              <pre style="margin-top: 10px; padding: 10px; background: #000; color: #aaa; overflow-x: auto;">${event.error ? event.error.stack : 'No stack trace available'}</pre>
            </div>
          `;
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
